<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boomers AI — Coming Soon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #33ff33;
  --green2: #00cc00;
  --green3: #00ff41;
  --bg: #f5f5f0;
  --dark: #0a0a0a;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  cursor: none;
}

/* ── SPOTLIGHT CURSOR ── */
#spotlight {
  position: fixed;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.55) 30%, rgba(245,245,240,0) 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 10;
  mix-blend-mode: multiply;
  transition: opacity 0.3s;
}

/* ── GLITCH CANVAS LAYER ── */
#glitchCanvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
  opacity: 0.06;
}

/* ── MAIN CONTENT ── */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

/* ── GLITCH TEXT BLOCK ── */
.glitch-field {
  position: fixed;
  inset: 0;
  z-index: 2;
  overflow: hidden;
  pointer-events: none;
}

.glitch-line {
  position: absolute;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  font-weight: bold;
  color: var(--green);
  white-space: nowrap;
  opacity: 0;
  text-shadow: 0 0 6px var(--green);
  letter-spacing: 0.05em;
}

/* ── CENTER LOGO ── */
.center-logo {
  text-align: center;
  position: relative;
  z-index: 6;
}

.logo-main {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  letter-spacing: 0.45em;
  color: #1a1a1a;
  text-transform: uppercase;
  font-weight: bold;
  display: block;
  margin-bottom: 0.5rem;
}

.logo-sub {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(0.55rem, 1.2vw, 0.7rem);
  letter-spacing: 0.3em;
  color: rgba(0,0,0,0.25);
  text-transform: uppercase;
  display: block;
  margin-bottom: 3.5rem;
}

/* ── COMING SOON LINE ── */
.coming-line {
  display: flex;
  align-items: center;
  gap: 1.2rem;
  margin-bottom: 3rem;
}
.coming-rule { width: 40px; height: 1px; background: rgba(0,0,0,0.15); }
.coming-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(0.6rem, 1.5vw, 0.72rem);
  letter-spacing: 0.28em;
  color: rgba(0,0,0,0.3);
  text-transform: uppercase;
}

/* ── EMAIL FORM ── */
.form-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  width: min(380px, 85vw);
}

.form-row {
  display: flex;
  width: 100%;
}

.email-input {
  flex: 1;
  padding: 0.85rem 1rem;
  background: transparent;
  border: 1px solid rgba(0,0,0,0.15);
  border-right: none;
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.2s;
}
.email-input::placeholder { color: rgba(0,0,0,0.22); }
.email-input:focus { border-color: rgba(0,0,0,0.4); }

.notify-btn {
  padding: 0.85rem 1.2rem;
  background: #1a1a1a;
  color: #f5f5f0;
  border: 1px solid #1a1a1a;
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: none;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.notify-btn:hover { opacity: 0.75; }

.form-note {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: rgba(0,0,0,0.18);
  text-transform: uppercase;
}

.success-msg {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  color: #1a7a1a;
  opacity: 0;
  transition: opacity 0.5s;
  margin-top: 0.2rem;
}
.success-msg.show { opacity: 1; }

/* ── BOTTOM DOMAIN ── */
.bottom-bar {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  text-align: center;
}
.bottom-domain {
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  color: rgba(0,0,0,0.15);
  text-transform: uppercase;
}

/* ── CURSOR DOT ── */
#cursor-dot {
  position: fixed;
  width: 4px; height: 4px;
  background: #1a1a1a;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 20;
}
</style>
</head>
<body>

<div id="spotlight"></div>
<div id="cursor-dot"></div>
<canvas id="glitchCanvas"></canvas>
<div class="glitch-field" id="glitchField"></div>

<div class="stage">
  <div class="center-logo">
    <span class="logo-main">Boomers AI</span>
    <span class="logo-sub">forboomers.ai</span>

    <div class="coming-line">
      <div class="coming-rule"></div>
      <span class="coming-text">Coming Soon</span>
      <div class="coming-rule"></div>
    </div>

    <div class="form-wrap">
      <div class="form-row">
        <input type="email" class="email-input" id="cs-email" placeholder="your@email.com" />
        <button class="notify-btn" id="cs-btn" onclick="handleNotify()">Notify Me</button>
      </div>
      <span class="form-note">First access · Founding rate</span>
      <p class="success-msg" id="cs-success">✓ You're on the list.</p>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <p class="bottom-domain">forboomers.ai — 2026</p>
</div>

<script>
// ── CURSOR ──
const spotlight = document.getElementById('spotlight');
const dot = document.getElementById('cursor-dot');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let sx = mx, sy = my;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

function animCursor() {
  sx += (mx - sx) * 0.1;
  sy += (my - sy) * 0.1;
  spotlight.style.left = sx + 'px';
  spotlight.style.top  = sy + 'px';
  dot.style.left = mx + 'px';
  dot.style.top  = my + 'px';
  requestAnimationFrame(animCursor);
}
animCursor();

// ── GLITCH SCANLINES ON CANVAS ──
const canvas = document.getElementById('glitchCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawScanlines() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,180,0,0.12)';
  for (let y = 0; y < canvas.height; y += 3) {
    ctx.fillRect(0, y, canvas.width, 1);
  }
}
drawScanlines();
window.addEventListener('resize', drawScanlines);

// ── MS-DOS + AOL GLITCH TEXT LINES ──
const field = document.getElementById('glitchField');

const dosLines = [
  'C:\\> LOADING BOOMERS_AI.EXE...',
  'C:\\> INITIALIZING NEURAL NET...',
  'C:\\> MEMORY: 640K OK',
  'C:\\> AUTOEXEC.BAT',
  'C:\\WINDOWS> REBOOT Y/N',
  'C:\\> DIR /W /P',
  'HIMEM.SYS LOADED',
  'C:\\> FORMAT A: /S',
  'C:\\> EDIT CONFIG.SYS',
  'SMARTDRV.EXE',
  'C:\\> CD\\DOOM',
  'C:\\> SCANDISK /ALL',
  'C:\\DOS> DELTREE /Y C:\\WINDOWS',
  'C:\\> FDISK /MBR',
  'EMM386.EXE NOEMS',
  '*** SYSTEM READY ***',
  'Welcome to America Online.',
  'You have mail.',
  'Connecting at 14,400 bps...',
  'Dialing 1-800-827-6364...',
  'CONNECT 28800',
  'NO CARRIER',
  'ATDT1234567',
  'User ID: boomer001',
  'Password: ********',
  'File transfer: 2.3KB of 890KB',
  'AOL Keyword: INTERNET',
  'Buddy List updated.',
  'Sign On: GolfPro1952',
  '*** YOU HAVE 47 NEW MESSAGES ***',
  'Downloading... 3%',
  'Downloading... 3%',
  'Downloading... 3%',
  'ERROR: CONNECTION LOST',
  'REDIAL? Y',
  'Welcome! You\'ve got mail!',
  'C:\\> WIN',
  'Starting Windows 3.1...',
  'GENERAL PROTECTION FAULT',
  'Press any key to continue_',
];

// spawn glitch lines randomly across screen
function spawnLine() {
  const el = document.createElement('div');
  el.className = 'glitch-line';
  const text = dosLines[Math.floor(Math.random() * dosLines.length)];
  el.textContent = text;

  const x = Math.random() * (window.innerWidth - 400);
  const y = Math.random() * window.innerHeight;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';

  // randomise green shades and sizes
  const greens = ['#33ff33','#00ff41','#00cc00','#39ff14','#00e600','#7fff00'];
  el.style.color = greens[Math.floor(Math.random() * greens.length)];
  el.style.fontSize = (9 + Math.random() * 5) + 'px';
  el.style.textShadow = `0 0 ${4 + Math.random()*6}px currentColor`;
  el.style.opacity = 0;

  // random letter-spacing glitch
  el.style.letterSpacing = (Math.random() * 0.15) + 'em';

  field.appendChild(el);

  // fade in
  const delay = Math.random() * 200;
  const duration = 300 + Math.random() * 400;
  const hold = 400 + Math.random() * 1200;

  setTimeout(() => {
    el.style.transition = `opacity ${duration}ms`;
    el.style.opacity = 0.7 + Math.random() * 0.3;

    // occasional horizontal glitch shift
    if (Math.random() > 0.6) {
      el.style.transform = `translateX(${(Math.random()-0.5)*20}px)`;
      el.style.transition += ', transform 80ms';
    }

    setTimeout(() => {
      el.style.opacity = 0;
      setTimeout(() => el.remove(), duration);
    }, hold);
  }, delay);
}

// spawn density — light, continuous
setInterval(spawnLine, 180);
// initial burst
for (let i = 0; i < 12; i++) {
  setTimeout(spawnLine, i * 60);
}

// ── PERIODIC FULL SCREEN GLITCH FLASH ──
function bigGlitch() {
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    setTimeout(spawnLine, i * 30);
  }
  setTimeout(bigGlitch, 3000 + Math.random() * 5000);
}
setTimeout(bigGlitch, 2000);

// ── FORM ──
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzS4x_V07yqgp4UjY7aKQHIOwJYCGyX7co8huiUVqmkeNWGQZKE4RUPQ6iLBMK5SQ/exec';

async function handleNotify() {
  const input = document.getElementById('cs-email');
  const btn   = document.getElementById('cs-btn');
  const v = input.value.trim();
  if (!v.includes('@') || !v.includes('.')) return;

  // Button loading state
  btn.textContent = 'Sending...';
  btn.disabled = true;

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: v })
    });
  } catch(e) {
    // no-cors always throws — submission still goes through
  }

  // Show success regardless (no-cors can't read response)
  input.value = '';
  btn.textContent = 'Notify Me';
  btn.disabled = false;
  document.getElementById('cs-success').classList.add('show');

  // Trigger a glitch burst on success — feels good
  for (let i = 0; i < 10; i++) setTimeout(spawnLine, i * 25);
}

document.getElementById('cs-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleNotify();
});
</script>
</body>
</html>
